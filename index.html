<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에덴 EDEN</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --bg2: #111115;
    --cream: #e8e0d0;
    --red: #8b1a1a;
    --red2: #c0392b;
    --gold: #b8954a;
    --dim: rgba(0,0,0,0.85);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    height: 100vh;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  /* ── TITLE SCREEN ── */
  #title-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #050507;
    z-index: 100;
    transition: opacity 1.5s;
  }
  #title-screen.fade-out { opacity: 0; pointer-events: none; }

  .title-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 60%, rgba(139,26,26,0.12) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
  }
  .title-grain {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  .title-deco {
    width: 1px; height: 80px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin-bottom: 32px;
    animation: pulse-line 3s ease-in-out infinite;
  }
  @keyframes pulse-line {
    0%,100% { opacity:0.4; transform: scaleY(0.8); }
    50% { opacity:1; transform: scaleY(1); }
  }

  .title-main {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(48px, 8vw, 88px);
    font-weight: 300;
    letter-spacing: 0.35em;
    color: var(--cream);
    text-shadow: 0 0 60px rgba(139,26,26,0.5);
    animation: title-appear 2s ease forwards;
    opacity: 0;
  }
  @keyframes title-appear {
    from { opacity:0; letter-spacing: 0.5em; }
    to { opacity:1; letter-spacing: 0.35em; }
  }

  .title-sub {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    opacity: 0.7;
    margin-top: 14px;
    animation: fade-in-delay 2s 1s ease forwards;
    opacity: 0;
  }
  @keyframes fade-in-delay {
    from { opacity:0; }
    to { opacity:0.7; }
  }

  .title-tagline {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: rgba(232,224,208,0.35);
    margin-top: 8px;
    animation: fade-in-delay 2s 1.5s ease forwards;
    opacity: 0;
  }

  .title-btn {
    margin-top: 64px;
    padding: 14px 48px;
    border: 1px solid rgba(184,149,74,0.4);
    background: transparent;
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.4s;
    animation: fade-in-delay 2s 2s ease forwards;
    opacity: 0;
    position: relative;
    overflow: hidden;
  }
  .title-btn::before {
    content:''; position:absolute; inset:0;
    background: rgba(139,26,26,0.0);
    transition: background 0.4s;
  }
  .title-btn:hover { border-color: var(--gold); color: var(--gold); }
  .title-btn:hover::before { background: rgba(139,26,26,0.15); }

  /* ── GAME SCREEN ── */
  #game-screen {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
  }
  #game-screen.active { display: flex; }

  /* Scene / Background */
  #scene {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0a0c;
  }

  .scene-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 0.8s;
  }

  /* SVG Room backgrounds */
  .bg-teresa-room {
    background:
      linear-gradient(180deg, #1a1008 0%, #2d1e0e 30%, #3d2a14 60%, #1e1208 100%);
  }
  .bg-teresa-room::before {
    content:''; position:absolute; inset:0;
    background:
      /* floor */
      linear-gradient(0deg, #0d0906 0%, transparent 35%),
      /* window light */
      radial-gradient(ellipse 30% 60% at 75% 20%, rgba(180,140,80,0.08) 0%, transparent 70%),
      /* wall texture */
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.012) 60px);
  }

  .bg-teresa-hallway {
    background: linear-gradient(180deg, #15100a 0%, #241808 35%, #1a1208 70%, #0d0906 100%);
  }
  .bg-teresa-hallway::before {
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 30%),
      radial-gradient(ellipse 15% 80% at 50% 50%, rgba(180,140,60,0.06) 0%, transparent 100%),
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.01) 80px);
  }

  .bg-teresa-desk {
    background: linear-gradient(180deg, #1a1008 0%, #2d1e0e 40%, #3d2a14 70%, #1e1208 100%);
  }

  .bg-eva-home {
    background: linear-gradient(180deg, #0f1520 0%, #1a2030 40%, #141a28 70%, #0a0f18 100%);
  }
  .bg-eva-home::before {
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 40% 30% at 50% 0%, rgba(100,130,180,0.08) 0%, transparent 60%),
      linear-gradient(0deg, rgba(0,0,0,0.4) 0%, transparent 40%);
  }
  .bg-teresa-kitchen {
    background: linear-gradient(180deg, #1c1408 0%, #130e06 60%, #0e0904 100%);
  }
  .bg-teresa-kitchen::before {
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 40%),
      radial-gradient(ellipse 30% 50% at 85% 35%, rgba(160,180,200,0.04) 0%, transparent 60%);
  }

  /* Atmospheric overlay */
  .scene-vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(0,0,0,0.6) 100%);
    z-index: 2;
  }

  /* Rendered room objects */
  .room-objects {
    position: absolute; inset: 0; z-index: 3;
    /* nav 버튼 영역(가장자리/하단)은 pointer-events 안 받도록 margin */
  }

  /* Clickable hotspot */
  .hotspot {
    position: absolute;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 4;
  }
  .hotspot::after {
    content: attr(data-label);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,10,12,0.9);
    border: 1px solid rgba(184,149,74,0.3);
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 0.2em;
    padding: 4px 10px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .hotspot:hover::after { opacity: 1; }
  .hotspot:hover .hotspot-inner { border-color: var(--gold); box-shadow: 0 0 12px rgba(184,149,74,0.4); }

  .hotspot-inner {
    width: 100%; height: 100%;
    border: 1px solid rgba(184,149,74,0.2);
    border-radius: 2px;
    transition: all 0.2s;
    animation: pulse-hot 3s ease-in-out infinite;
  }
  @keyframes pulse-hot {
    0%,100% { border-color: rgba(184,149,74,0.2); }
    50% { border-color: rgba(184,149,74,0.45); }
  }

  /* SVG room art */
  #room-art {
    position: absolute; inset: 0; z-index: 1;
  }

  /* Navigation arrows */
  #nav-arrows {
    position: fixed;
    top: 0; left: 0; right: 0;
    bottom: 110px;
    z-index: 500;
    pointer-events: none;
  }

  .nav-btn {
    position: absolute;
    pointer-events: all;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    opacity: 0.6;
    background: none;
    border: none;
    padding: 16px;
  }
  .nav-btn:hover { opacity: 1; }
  .nav-btn.hidden { display: none; }

  .nav-btn svg { transition: transform 0.2s; }
  .nav-btn:hover svg { transform: scale(1.2); }

  .nav-forward {
    bottom: 18%; left: 50%; transform: translateX(-50%);
  }
  .nav-left {
    left: 2%; top: 50%; transform: translateY(-50%);
  }
  .nav-right {
    right: 2%; top: 50%; transform: translateY(-50%);
  }
  .nav-back {
    bottom: 2%; left: 50%; transform: translateX(-50%);
  }

  /* ── BOTTOM UI BAR ── */
  #ui-bar {
    height: 110px;
    background: linear-gradient(0deg, #050507 0%, #0a0a0e 100%);
    border-top: 1px solid rgba(184,149,74,0.15);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    position: relative;
    z-index: 20;
  }

  /* Quick slots */
  .inv-slot {
    width: 72px; height: 72px;
    border: 1px solid rgba(184,149,74,0.2);
    background: rgba(255,255,255,0.02);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    flex-shrink: 0;
  }
  .inv-slot:hover { border-color: rgba(184,149,74,0.5); background: rgba(184,149,74,0.05); }
  .inv-slot.has-item { border-color: rgba(184,149,74,0.35); }
  .inv-slot .item-icon { font-size: 22px; }
  .inv-slot .item-name { font-size: 8px; letter-spacing: 0.1em; color: rgba(232,224,208,0.5); margin-top: 4px; }
  .inv-slot .item-count {
    position: absolute; top: 4px; right: 4px;
    font-size: 9px; color: var(--gold);
  }

  .inv-divider {
    width: 1px; height: 60px;
    background: rgba(184,149,74,0.15);
    flex-shrink: 0;
  }

  /* Status */
  #status-area {
    flex: 1;
    padding: 0 16px;
    display: flex; flex-direction: column; justify-content: center;
    gap: 6px;
  }

  .status-scene {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    opacity: 0.7;
  }
  .status-collect {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(232,224,208,0.4);
  }
  .collect-bar {
    width: 120px; height: 2px;
    background: rgba(255,255,255,0.08);
    margin-top: 4px;
    position: relative;
  }
  .collect-bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.6s ease;
  }

  /* UI buttons */
  .ui-btn {
    width: 72px; height: 72px;
    border: 1px solid rgba(184,149,74,0.2);
    background: transparent;
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    flex-shrink: 0;
  }
  .ui-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(184,149,74,0.05); }
  .ui-btn .btn-icon { font-size: 20px; }

  /* ── DIALOG ── */
  #dialog-overlay {
    position: fixed; inset: 0;
    z-index: 50;
    pointer-events: none;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 0 0 130px 0;
  }
  #dialog-box {
    margin: 0 40px;
    background: rgba(5,5,7,0.95);
    border: 1px solid rgba(184,149,74,0.25);
    border-bottom: 2px solid rgba(184,149,74,0.4);
    padding: 24px 28px;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.4s;
    pointer-events: all;
    max-height: 200px;
  }
  #dialog-box.active {
    transform: translateY(0);
    opacity: 1;
  }
  .dialog-speaker {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .dialog-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--cream);
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
  }
  .dialog-continue {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(184,149,74,0.5);
    margin-top: 12px;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ── ITEM INSPECT ── */
  #inspect-overlay {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #inspect-overlay.active { display: flex; }
  #inspect-box {
    background: var(--bg2);
    border: 1px solid rgba(184,149,74,0.3);
    padding: 40px;
    max-width: 420px; width: 90%;
    text-align: center;
    position: relative;
  }
  .inspect-icon { font-size: 48px; margin-bottom: 20px; }
  .inspect-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px; font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }
  .inspect-desc {
    font-size: 13px; line-height: 1.9;
    color: rgba(232,224,208,0.75);
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
  }
  .inspect-acquire {
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(184,149,74,0.6);
  }
  .inspect-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; color: rgba(232,224,208,0.4);
    font-size: 18px; cursor: pointer;
    transition: color 0.2s;
  }
  .inspect-close:hover { color: var(--cream); }
  #inspect-overlay .btn-get {
    margin-top: 20px;
    padding: 10px 32px;
    border: 1px solid rgba(184,149,74,0.4);
    background: transparent;
    color: var(--gold);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: all 0.2s;
  }
  #inspect-overlay .btn-get:hover { background: rgba(184,149,74,0.1); }

  /* ── NOTEBOOK ── */
  #notebook-overlay {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #notebook-overlay.active { display: flex; }
  #notebook-box {
    background: #0e0c09;
    border: 1px solid rgba(184,149,74,0.25);
    width: min(680px, 92vw);
    height: min(500px, 85vh);
    display: flex;
    position: relative;
    overflow: hidden;
  }
  .nb-tabs {
    width: 80px;
    border-right: 1px solid rgba(184,149,74,0.15);
    display: flex; flex-direction: column;
    padding: 16px 0;
    gap: 4px;
  }
  .nb-tab {
    padding: 12px 8px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(232,224,208,0.4);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    border-left: 2px solid transparent;
  }
  .nb-tab.active { color: var(--gold); border-left-color: var(--gold); background: rgba(184,149,74,0.05); }
  .nb-tab:hover { color: var(--cream); }
  .nb-content {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
  }
  .nb-content::-webkit-scrollbar { width: 4px; }
  .nb-content::-webkit-scrollbar-track { background: transparent; }
  .nb-content::-webkit-scrollbar-thumb { background: rgba(184,149,74,0.3); }
  .nb-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px; font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(184,149,74,0.15);
  }
  .nb-entry {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .nb-entry-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(184,149,74,0.8);
    margin-bottom: 8px;
  }
  .nb-entry-text {
    font-size: 12px;
    line-height: 1.9;
    color: rgba(232,224,208,0.65);
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
  }
  .nb-empty { font-size: 12px; color: rgba(232,224,208,0.25); letter-spacing: 0.1em; }
  .nb-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; color: rgba(232,224,208,0.4);
    font-size: 18px; cursor: pointer; transition: color 0.2s;
  }
  .nb-close:hover { color: var(--cream); }

  /* ── SCREEN TRANSITION ── */
  #transition-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s;
  }
  #transition-overlay.fade-in { opacity: 1; pointer-events: all; }

  /* ── NARRATION SCREEN ── */
  #narration-screen {
    position: fixed; inset: 0; z-index: 150;
    background: #000;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  #narration-screen.active { display: flex; }
  .narration-text {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 300;
    color: var(--cream);
    text-align: center;
    line-height: 2.2;
    max-width: 560px;
    padding: 0 32px;
    opacity: 0;
    transition: opacity 1.2s;
  }
  .narration-text.visible { opacity: 1; }
  .narration-continue {
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: rgba(184,149,74,0.5);
    animation: blink 2s ease-in-out infinite;
    cursor: pointer;
    opacity: 0;
    transition: opacity 1s 1s;
  }
  .narration-continue.visible { opacity: 1; }

  /* ── COMBO HINT ── */
  #combo-hint {
    position: fixed; top: 24px; right: 24px; z-index: 80;
    background: rgba(5,5,7,0.9);
    border: 1px solid rgba(139,26,26,0.5);
    padding: 12px 20px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(232,224,208,0.7);
    transform: translateX(120%);
    transition: transform 0.5s;
    max-width: 260px;
    line-height: 1.7;
  }
  #combo-hint.show { transform: translateX(0); }
  #combo-hint strong { color: var(--gold); }

  /* ── TOAST ── */
  #toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-60px);
    z-index: 90;
    background: rgba(10,10,12,0.95);
    border: 1px solid rgba(184,149,74,0.3);
    padding: 10px 24px;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--gold);
    transition: transform 0.4s;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Progress indicator */
  #progress-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 85; height: 2px;
    background: transparent;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red) 0%, var(--gold) 100%);
    width: 0%;
    transition: width 0.8s ease;
  }

  /* Cursor dot */
  .cursor-dot {
    position: fixed; z-index: 300;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    transition: transform 0.1s, opacity 0.2s;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
</style>
</head>
<body>

<div class="cursor-dot" id="cursor"></div>
<div id="transition-overlay"></div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<!-- TITLE -->
<div id="title-screen">
  <div class="title-bg"></div>
  <div class="title-grain"></div>
  <div class="title-deco"></div>
  <div class="title-main">에덴</div>
  <div class="title-sub">E D E N</div>
  <div class="title-tagline">사이비 종교 심리 스릴러</div>
  <button class="title-btn" onclick="startGame()">새 게임 시작</button>
</div>

<!-- NARRATION -->
<div id="narration-screen">
  <div class="narration-text" id="narration-text"></div>
  <div class="narration-continue" id="narration-continue" onclick="nextNarration()">[ 클릭하여 계속 ]</div>
</div>

<!-- NAV (game-screen 바깥, body 직속 fixed — hotspot에 절대 안 막힘) -->
<div id="nav-arrows" style="display:none">

// ─────────────────────────────────────────
//  CURSOR
// ─────────────────────────────────────────
document.addEventListener('mousemove', e => {
  const c = document.getElementById('cursor');
  c.style.left = e.clientX + 'px';
  c.style.top = e.clientY + 'px';
});

// ─────────────────────────────────────────
//  TITLE → GAME
// ─────────────────────────────────────────
function startGame() {
  const title = document.getElementById('title-screen');
  title.classList.add('fade-out');
  setTimeout(() => {
    title.style.display = 'none';
    showNarration(narrations.intro, () => {
      document.getElementById('game-screen').classList.add('active');
      document.getElementById('nav-arrows').style.display = 'block';
      loadScene('teresa_room');
    });
  }, 1600);
}

// ─────────────────────────────────────────
//  NARRATION
// ─────────────────────────────────────────
function showNarration(lines, cb) {
  currentNarrations = lines;
  narrationIdx = 0;
  narrationCallback = cb;
  const screen = document.getElementById('narration-screen');
  screen.classList.add('active');
  displayNarrationLine();
}

function displayNarrationLine() {
  const txt = document.getElementById('narration-text');
  const cont = document.getElementById('narration-continue');
  txt.classList.remove('visible');
  cont.classList.remove('visible');
  setTimeout(() => {
    txt.innerHTML = currentNarrations[narrationIdx].replace(/\n/g,'<br>');
    txt.classList.add('visible');
    setTimeout(() => cont.classList.add('visible'), 800);
  }, 400);
}

function nextNarration() {
  narrationIdx++;
  if (narrationIdx >= currentNarrations.length) {
    const screen = document.getElementById('narration-screen');
    screen.classList.remove('active');
    const txt = document.getElementById('narration-text');
    const cont = document.getElementById('narration-continue');
    txt.classList.remove('visible');
    cont.classList.remove('visible');
    if (narrationCallback) narrationCallback();
  } else {
    displayNarrationLine();
  }
}

// ─────────────────────────────────────────
//  SCENE LOADING
// ─────────────────────────────────────────
let _sceneTransTimer = null;
function loadScene(sceneId) {
  const overlay = document.getElementById('transition-overlay');
  // 진행 중인 타이머 있으면 취소
  if (_sceneTransTimer) { clearTimeout(_sceneTransTimer); _sceneTransTimer = null; }
  overlay.style.transition = 'opacity 0.3s';
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'all';
  _sceneTransTimer = setTimeout(() => {
    _loadScene(sceneId);
    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none'; // 즉시 해제 - 타이머 없앰
    _sceneTransTimer = null;
  }, 320);
}

function _loadScene(sceneId) {
  state.currentScene = sceneId;
  const scene = SCENES[sceneId];
  if (!scene) return;

  // Background
  const art = document.getElementById('room-art');
  art.className = 'scene-bg ' + scene.bgClass;

  // Draw SVG
  art.innerHTML = '';
  if (scene.svgFn) {
    const svg = scene.svgFn();
    art.appendChild(svg);
  }

  // Nav arrows
  const dirs = ['forward','left','right','back'];
  dirs.forEach(d => {
    const btn = document.getElementById('nav-' + d);
    if (scene.nav[d]) btn.classList.remove('hidden');
    else btn.classList.add('hidden');
  });

  // Hotspots — nav 버튼 영역(좌우 14%, 하단 22%, 상단 없음) 침범 방지
  const ro = document.getElementById('room-objects');
  ro.innerHTML = '';
  scene.hotspots.forEach(hs => {
    if (hs.action === 'item' && state.inventory.find(i => i.id === hs.itemId)) return;
    if (sceneId === 'teresa_hall' && hs.id === 'hs_drawer' && drawerOpened) return;

    const el = document.createElement('div');
    el.className = 'hotspot';
    el.id = hs.id;

    if (hs.id === 'hs_ceiling_beam') {
      el.setAttribute('data-label', state.ropeInstalled ? '올가미 (설치됨)' : (state.ropeAssembled ? '천장 들보' : '천장 들보'));
    } else {
      el.setAttribute('data-label', hs.label);
    }

    el.style.left = hs.x;
    el.style.top = hs.y;
    el.style.width = hs.w;
    el.style.height = hs.h;
    el.innerHTML = '<div class="hotspot-inner"></div>';
    el.onclick = () => handleHotspot(hs);
    ro.appendChild(el);
  });

  // Status
  document.getElementById('status-scene').textContent = scene.label;
  updateProgress();
}

// ─────────────────────────────────────────
//  HOTSPOT ACTIONS
// ─────────────────────────────────────────
function handleHotspot(hs) {
  if (hs.action === 'look') {
    showDialog(hs.speaker || '', hs.text);
  } else if (hs.action === 'item') {
    const item = ITEMS[hs.itemId];
    showInspect(item, true);
  } else if (hs.action === 'multi') {
    showDialogQueue(hs.dialogs, () => {
      if (hs.then === 'hs_drawer_open') {
        drawerOpened = true;
        showToast('서랍이 열렸다');
        _loadScene(state.currentScene);
      }
    });
  } else if (hs.action === 'install_rope') {
    if (!state.inventory.find(i => i.id === 'rope') && !state.ropeInstalled) {
      showDialog('테레사', '뭔가 걸 수 있을 것 같다.\n아직은 아니지만.');
      return;
    }
    if (state.ropeInstalled) {
      triggerTeresaUse();
      return;
    }
    installRope();
  } else if (hs.action === 'discover_body') {
    triggerBodyDiscovery();
  }
}

// ─────────────────────────────────────────
//  DIALOG
// ─────────────────────────────────────────
function showDialog(speaker, text, cb) {
  const box = document.getElementById('dialog-box');
  const sp = document.getElementById('dialog-speaker');
  const tx = document.getElementById('dialog-text');
  sp.textContent = speaker ? '[ ' + speaker + ' ]' : '';
  tx.innerHTML = text.replace(/\n/g, '<br>');
  box.classList.add('active');
  state.dialogActive = true;
  state._dialogCb = cb || null;
}

function showDialogQueue(queue, cb) {
  let idx = 0;
  function next() {
    if (idx >= queue.length) {
      const box = document.getElementById('dialog-box');
      box.classList.remove('active');
      state.dialogActive = false;
      if (cb) cb();
      return;
    }
    const q = queue[idx++];
    showDialog(q.speaker, q.text, null);
    state._dialogCb = next;
  }
  next();
}

document.getElementById('dialog-box').addEventListener('click', () => {
  if (!state.dialogActive) return;
  const box = document.getElementById('dialog-box');
  const cb = state._dialogCb;
  state._dialogCb = null;
  box.classList.remove('active');
  state.dialogActive = false;
  if (cb) cb();
});

// ─────────────────────────────────────────
//  INSPECT
// ─────────────────────────────────────────
let pendingAcquireItem = null;

function showInspect(item, canAcquire) {
  state.inspectItem = item;
  pendingAcquireItem = canAcquire ? item : null;
  document.getElementById('inspect-icon').textContent = item.icon;
  document.getElementById('inspect-name').textContent = item.name;
  document.getElementById('inspect-desc').innerHTML = item.desc.replace(/\n/g,'<br>');
  document.getElementById('inspect-acquire').textContent = canAcquire ? '인벤토리에 추가할 수 있다.' : '';
  document.getElementById('btn-get').style.display = canAcquire ? 'inline-block' : 'none';
  document.getElementById('inspect-overlay').classList.add('active');
}

function closeInspect() {
  document.getElementById('inspect-overlay').classList.remove('active');
}

function acquireItem() {
  if (!pendingAcquireItem) return;
  const item = pendingAcquireItem;
  closeInspect();

  if (state.inventory.find(i => i.id === item.id)) {
    showToast('이미 가지고 있다');
    return;
  }

  state.inventory.push(item);
  state.collected++;
  updateInventoryUI();
  updateProgress();
  _loadScene(state.currentScene);
  showToast('획득: ' + item.name);
  addNote(item.name, item.desc.split('\n')[0]);

  // Rope combo check
  if (['necktie1','necktie2','necktie3'].every(id => state.inventory.find(i=>i.id===id)) && !state.ropeAssembled) {
    setTimeout(() => showComboHint(), 800);
  }

  // diary triggers note
  if (item.id === 'diary') {
    setTimeout(() => {
      showDialog('테레사', '오늘 하루도 그냥 지나갔다.\n별로 남긴 것도 없는 것 같다.');
    }, 600);
  }
}

// ─────────────────────────────────────────
//  COMBO
// ─────────────────────────────────────────
function showComboHint() {
  document.getElementById('combo-hint-text').textContent = '넥타이 3개를 모았다. 조합 버튼으로 묶을 수 있다.';
  const hint = document.getElementById('combo-hint');
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 5000);
}

function tryCombo() {
  const has = (id) => state.inventory.find(i=>i.id===id);
  if (has('necktie1') && has('necktie2') && has('necktie3') && !state.ropeAssembled) {
    state.inventory = state.inventory.filter(i => !['necktie1','necktie2','necktie3'].includes(i.id));
    state.ropeAssembled = true;
    state.inventory.push(ITEMS.rope);
    updateInventoryUI();
    showInspect(ITEMS.rope, false);
    showToast('조합 성공: 밧줄');
    // 힌트
    setTimeout(() => {
      document.getElementById('combo-hint-text').textContent = '부엌 천장 들보에 뭔가 걸 수 있을 것 같다.';
      document.getElementById('combo-hint').classList.add('show');
      setTimeout(() => document.getElementById('combo-hint').classList.remove('show'), 5000);
    }, 2200);
  } else {
    showToast('조합할 수 있는 재료가 없다');
  }
}

function openNotebook() {
  document.getElementById('notebook-overlay').classList.add('active');
  renderNotebook();
}
function closeNotebook() {
  document.getElementById('notebook-overlay').classList.remove('active');
}
function switchTab(tab) {
  state.notebookTab = tab;
  document.querySelectorAll('.nb-tab').forEach((el,i) => {
    el.classList.toggle('active', ['notes','map','items'][i] === tab);
  });
  renderNotebook();
}
function addNote(title, text) {
  if (!state.notes.find(n => n.title === title)) {
    state.notes.push({ title, text });
  }
}
function renderNotebook() {
  const c = document.getElementById('nb-content');
  const tab = state.notebookTab;
  if (tab === 'notes') {
    if (state.notes.length === 0) {
      c.innerHTML = '<div class="nb-title">— 메모 —</div><div class="nb-empty">아직 기록이 없다.</div>';
    } else {

        state.notes.map(n => `<div class="nb-entry"><div class="nb-entry-title">${n.title}</div><div class="nb-entry-text">${n.text.replace(/\n/g,'<br>')}</div></div>`).join('');
    }
  } else if (tab === 'map') {
    c.innerHTML = `<div class="nb-title">— 지도 —</div>
    <div style="padding:16px;border:1px solid rgba(184,149,74,0.15);font-size:11px;letter-spacing:0.1em;color:rgba(232,224,208,0.5);line-height:2.2">

      <div style="margin-top:12px;color:rgba(184,149,74,0.4)">에덴 요양병원으로 가야 할 것 같다...</div>

    </div>`;

      c.innerHTML = '<div class="nb-title">— 소지품 —</div><div class="nb-empty">아무것도 없다.</div>';

        ).join('');

  }
}

// ─────────────────────────────────────────
//  UI UPDATES
// ─────────────────────────────────────────
function updateInventoryUI() {
  for (let i = 0; i < 4; i++) {
    const slot = document.getElementById('slot-' + i);
    const icon = document.getElementById('slot-' + i + '-icon');
    const name = document.getElementById('slot-' + i + '-name');
    const item = state.inventory[i];
    if (item) {
      icon.textContent = item.icon;
      name.textContent = item.name.length > 6 ? item.name.slice(0,6)+'…' : item.name;
      slot.classList.add('has-item');
    } else {
      icon.textContent = '·';
      name.textContent = '';
      slot.classList.remove('has-item');
    }
  }
}

function inspectSlot(i) {
  const item = state.inventory[i];
  if (item) showInspect(item, false);
}

function updateProgress() {
  const pct = Math.round(state.collected / state.totalCollectables * 100);
  document.getElementById('status-collect').textContent = '수집률 ' + pct + '%';
  document.getElementById('collect-fill').style.width = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
